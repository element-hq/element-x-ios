project: ElementX.xcodeproj
# Periphery scans all targets built by these schemes. The ElementX scheme also
# builds NSE, ShareExtension and MatrixRustSDKMocks as dependencies. When the
# project is configured with the submodule, its sources are part of these same
# targets and are scanned too.
schemes:
- ElementX
- UnitTests
- PreviewTests
- UITests
- IntegrationTests
- AccessibilityTests
report_exclude:
- "**/Generated/**"
retain_swift_ui_previews: true
