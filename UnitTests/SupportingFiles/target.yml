name: UnitTests

schemes:
  UnitTests:
    analyze:
      config: Debug
    archive:
      config: Release
    build:
      targets:
        UnitTests: all
    profile:
      config: Release
    run:
      config: Debug
      disableMainThreadChecker: false
    test:
      config: Debug
      disableMainThreadChecker: false
      gatherCoverageData: true
      coverageTargets:
        - ElementX
      testPlans:
        - path: UnitTests.xctestplan
          defaultPlan: true

targets:
  UnitTests:
    type: bundle.unit-test
    platform: iOS

    dependencies:
    - target: ElementX
    - package: MatrixRustSDK
    - package: AsyncAlgorithms
    - package: Clocks
    - package: Dynamic
    - package: BuildExtensions
      product: Macros

    info:
      path: ../SupportingFiles/Info.plist

    settings:
      base:
        PRODUCT_NAME: UnitTests
        PRODUCT_BUNDLE_IDENTIFIER: ${BASE_BUNDLE_IDENTIFIER}.unit.tests
        # Requires iOS 26 so tests exercise the Observations-based observe(_:) overload.
        IPHONEOS_DEPLOYMENT_TARGET: '26.0'
        SWIFT_VERSION: 6.2
        SWIFT_APPROACHABLE_CONCURRENCY: YES
        SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
      debug:
      release:

    sources:
    - path: ../Sources
    - path: ../SupportingFiles
    - path: ../../DevelopmentAssets/Media
    - path: ../../DevelopmentAssets/ClassicAppFixtures
      buildPhase: resources # Necessary to add binary files to the target.
    - path: ../../ElementX/Sources/Other/Extensions/Publisher.swift
    - path: ../../ElementX/Sources/Other/InfoPlistReader.swift
    - path: ../../Tools/Scripts/Templates/SimpleScreenExample/Tests/Unit
    
